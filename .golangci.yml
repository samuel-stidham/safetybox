version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - importas
    - ineffassign
    - interfacebloat
    - ireturn
    - lll
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - nlreturn
    - noctx
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl_v5
    - zerologlint
  settings:
    goconst:
      ignore-tests: true
    paralleltest:
      ignore-missing: true
      ignore-missing-subtests: true
    varnamelen:
      ignore-decls:
        - w io.Writer
        - r io.Reader
        - t *testing.T
        - db *sql.DB
        - tx *sql.Tx
        - i int
        - ok bool
  exclusions:
    # Test-file exclusions are justified linter by linter in
    # docs/linting.md. Add nothing here without a matching entry.
    rules:
      - path: _test\.go
        linters:
          - dogsled
          - dupl
          - errorlint
          - funlen
          - goconst
          - mnd
          - prealloc
          - unparam
          - varnamelen
      # G301, G302, G304 only. Tests build file paths from t.TempDir
      # and create fixtures with deliberately chosen (often loose)
      # permissions to exercise the permission checks. The rest of
      # gosec still applies to tests, including G101.
      - path: _test\.go
        text: "(G301|G302|G304)"
        linters:
          - gosec
      # G204 in one file only. The shell round-trip test deliberately
      # runs reveal's own quoted output in a real shell to prove the
      # quoting is injection-safe. G204 stays active for every other
      # test. See docs/linting.md.
      - path: ^cmd/review_fixes_internal_test\.go$
        text: "G204"
        linters:
          - gosec
      # wrapcheck, io.Reader.Read pass-through only. The wiping-reader
      # test double must hand the source error through verbatim, since
      # the reader under test detects end of input from it. wrapcheck
      # stays active for every other error in tests. See
      # docs/linting.md.
      - path: ^internal/secret/secret_test\.go$
        text: 'sig: func \(io\.Reader\)\.Read'
        linters:
          - wrapcheck
      # G204 in cmd/exec.go only. The exec verb runs the operator's own
      # argv, which is its entire purpose, so the input is not tainted.
      # G204 stays active everywhere else in production. See
      # docs/linting.md.
      - path: ^cmd/exec\.go$
        text: "G204"
        linters:
          - gosec

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - prefix(github.com/samuel-stidham/safetybox/v3)
        - default
      # Without this, gci ignores the section order above and puts
      # the prefix group last, undoing the Makefile's gci target.
      custom-order: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
